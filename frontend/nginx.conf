server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain application/javascript application/json text/css;

    # Proxy API requests to the backend service via public URL
    location /api/ {
        proxy_pass https://customer-support-bot-production-ec40.up.railway.app/api/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host customer-support-bot-production-ec40.up.railway.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # SPA fallback for all other routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
